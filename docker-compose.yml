services:
  postgres:
    image: postgres:17-alpine
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - track_io_timing=on
      - -c
      - track_functions=all
      - -c
      - log_min_duration_statement=250
    environment:
      POSTGRES_DB: index_analyzer
      POSTGRES_USER: index_analyzer
      POSTGRES_PASSWORD: index_analyzer
    ports:
      - "55433:5432"
    volumes:
      - index-analyzer-postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U index_analyzer -d index_analyzer"]
      interval: 2s
      timeout: 3s
      retries: 30
    shm_size: 256mb

volumes:
  index-analyzer-postgres:
